{% extends 'main.html' %}
{% block title %} Login {% endblock %}

{% block content %}

 <div class="container mt-5">
  <div class="row mt-5">
      <div class="col-sm-6 offset-sm-3" style="border:1px solid grey; padding:10px;">
           <h2 class="text-center text-primary mb-3"><u>C-Panel</u></h2>  
         <form action="login" method="post">
                {% csrf_token %}
                 <div class="mt-2">
                    <label>Email-Id</label>
                    <input type="email" required name="email" class="form-control">
                 </div>
                  <div class="mt-2">
                    <label>Password</label>
                    <input type="password" required name="password" class="form-control">
                 </div>
                  <div class="mt-2 text-center">
                    <button class="btn btn-primary">Login</button> <br><br>

                    <a href="newuser" class="mt-3">Create An Account?</a>
                 </div>
            </form>
            <div class="text-center text-danger">
                <h5>
                    {% for message in messages %}
                           {{ message }}
                    {% endfor %}

                </h5>
            </div>
      </div> 
  </div>
 </div>


{% endblock %}
